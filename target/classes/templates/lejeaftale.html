<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>



</head>
<body>
<p th:if="${error}" th:text="${error}" style="color:red;"></p>
<form action="/lejeaftale" method="post" th:object="${lejeaftale}">

    Bil:
    <select th:field="*{bilId}">
        <option th:each="bil : ${biler}"
                th:value="${bil.id}"
                th:text="${bil.brand + ' ' + bil.model}">
        </option>
    </select><br>

    Kunde:
    <select th:field="*{kundeId}">
        <option value="1">Kunde 1</option>
        <option value="2">Kunde 2</option>
    </select><br>
    Start dato: <input type="date" th:field="*{startDato}"><br>
    Slut dato: <input type="date" th:field="*{slutDato}"><br>

    <button type="submit">Opret</button>
</form>
<p th:if="${success}" th:text="${success}" style="color:green;"></p>

</body>
</html>
